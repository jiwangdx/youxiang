<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>优享生活圈AI顾问</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/vue@3.2.31/dist/vue.global.min.js"></script>
    <style>
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
        }

        /* 滚动条样式 */
        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: #f1f1f1;
        }

        ::-webkit-scrollbar-thumb {
            background: #c1c1c1;
            border-radius: 3px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #a8a8a8;
        }

        /* 输入框自适应高度 */
        textarea {
            min-height: 44px;
            max-height: 200px;
            transition: height 0.2s;
        }

        /* 加载动画 */
        @keyframes pulse {
            0%, 100% {
                opacity: 0.5;
            }
            50% {
                opacity: 1;
            }
        }

        .animate-pulse {
            animation: pulse 1.5s infinite;
        }

        .delay-100 {
            animation-delay: 0.1s;
        }

        .delay-200 {
            animation-delay: 0.2s;
        }

        /* 打字机效果 */
        .typing-cursor::after {
            content: "|";
            animation: blink 1s step-end infinite;
        }

        @keyframes blink {
            from, to {
                opacity: 1;
            }
            50% {
                opacity: 0;
            }
        }

        /* 消息出现动画 */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message-enter {
            animation: fadeInUp 0.3s ease-out forwards;
        }

        /* 平滑过渡 */
        .transition-all {
            transition: all 0.3s ease;
        }

        /* 工具卡片样式 */
        .tool-card {
            transition: all 0.3s ease;
        }

        .tool-card:hover {
            transform: translateY(-5px);
        }

        /* 会话列表项样式 */
        .session-item {
            transition: all 0.2s ease;
        }

        .session-item:hover {
            background-color: rgba(59, 130, 246, 0.1);
        }

        .session-item.active {
            background-color: rgba(59, 130, 246, 0.2);
            border-left: 3px solid #3B82F6;
        }

        /* 侧边栏过渡动画 */
        .sidebar-transition {
            transition: transform 0.3s ease, width 0.3s ease;
        }
    </style>
</head>
<body>
<div id="app" class="flex h-screen bg-gray-50 transition-all" :class="{ 'bg-gray-900': darkMode }">
    <!-- 侧边栏 -->
    <aside 
        :class="[
            'sidebar-transition bg-white dark:bg-gray-800 border-r dark:border-gray-700 flex flex-col',
            sidebarOpen ? 'w-72' : 'w-0 overflow-hidden'
        ]"
    >
        <!-- 侧边栏头部 -->
        <div class="p-4 border-b dark:border-gray-700 flex items-center justify-between">
            <div class="flex items-center space-x-2">
                <i class="fas fa-comment-dots text-blue-500 text-xl"></i>
                <span class="font-bold text-gray-800 dark:text-white">对话历史</span>
            </div>
            <button @click="sidebarOpen = false" class="p-1 rounded hover:bg-gray-100 dark:hover:bg-gray-700">
                <i class="fas fa-times text-gray-500"></i>
            </button>
        </div>
        
        <!-- 新建会话按钮 -->
        <div class="p-4">
            <button 
                @click="startNewConversation"
                class="w-full p-3 rounded-lg bg-gradient-to-r from-blue-500 to-indigo-600 hover:from-blue-600 hover:to-indigo-700 text-white flex items-center justify-center space-x-2 shadow-md hover:shadow-lg transition-all"
            >
                <i class="fas fa-plus"></i>
                <span>新建会话</span>
            </button>
        </div>
        
        <!-- 会话列表 -->
        <div class="flex-1 overflow-y-auto">
            <div v-for="session in sessions" :key="session.sessionId" 
                 :class="['session-item p-3 cursor-pointer border-b dark:border-gray-700', 
                          { 'active': currentSessionId === session.sessionId }]">
                <div class="flex items-start justify-between group">
                    <div class="flex-1 min-w-0" @click="loadSession(session.sessionId)">
                        <div class="flex items-center space-x-2">
                            <i :class="session.isImportant ? 'fas fa-star text-yellow-500' : 'fas fa-comment text-gray-400'"></i>
                            <div v-if="editingSessionId === session.sessionId" class="flex-1">
                                <input 
                                    v-model="newSessionTitle"
                                    @keydown.enter="saveRenameSession(session)"
                                    @keydown.escape="cancelRenameSession"
                                    @blur="saveRenameSession(session)"
                                    :data-session-id="session.sessionId"
                                    class="w-full text-sm font-medium text-gray-800 dark:text-white bg-transparent border border-blue-500 rounded px-1 focus:outline-none"
                                    @click.stop
                                />
                            </div>
                            <span v-else class="text-sm font-medium text-gray-800 dark:text-white truncate">
                                {{ getSessionPreview(session) }}
                            </span>
                        </div>
                        <div class="text-xs text-gray-500 dark:text-gray-400 mt-1">
                            {{ formatDateTime(session.lastAccessTime) }}
                        </div>
                    </div>
                    <div class="flex items-center space-x-1 opacity-0 group-hover:opacity-100 transition-opacity">
                        <button 
                            v-if="editingSessionId !== session.sessionId"
                            @click.stop="startRenameSession(session)"
                            class="p-1 rounded hover:bg-gray-200 dark:hover:bg-gray-700 text-gray-400 hover:text-blue-500"
                            title="重命名会话"
                        >
                            <i class="fas fa-edit"></i>
                        </button>
                        <button 
                            @click.stop="toggleImportant(session)"
                            :class="['p-1 rounded hover:bg-gray-200 dark:hover:bg-gray-700',
                                     session.isImportant ? 'text-yellow-500' : 'text-gray-400']"
                            :title="session.isImportant ? '取消标记重要' : '标记为重要'"
                        >
                            <i :class="session.isImportant ? 'fas fa-star' : 'far fa-star'"></i>
                        </button>
                        <button 
                            @click.stop="deleteSession(session.sessionId)"
                            class="p-1 rounded hover:bg-red-100 dark:hover:bg-red-900 text-gray-400 hover:text-red-500"
                            title="删除会话"
                        >
                            <i class="fas fa-trash-alt"></i>
                        </button>
                    </div>
                </div>
            </div>
            <div v-if="sessions.length === 0" class="p-8 text-center text-gray-500 dark:text-gray-400">
                <i class="fas fa-inbox text-4xl mb-3 opacity-50"></i>
                <p>暂无历史会话</p>
            </div>
        </div>
    </aside>

    <!-- 主内容区 -->
    <main class="flex-1 flex flex-col overflow-hidden">
        <!-- 顶部导航栏 -->
        <header class="bg-white dark:bg-gray-800 shadow-md py-3 px-4 flex items-center justify-between transition-all">
            <div class="flex items-center space-x-3">
                <button @click="sidebarOpen = !sidebarOpen" class="p-2 rounded-lg hover:bg-gray-100 dark:hover:bg-gray-700">
                    <i class="fas fa-bars text-gray-600 dark:text-gray-300"></i>
                </button>
                <div class="flex items-center space-x-2">
                    <i class="fas fa-comment-dots text-blue-500 text-2xl"></i>
                    <div class="text-xl font-bold bg-gradient-to-r from-blue-500 to-indigo-600 bg-clip-text text-transparent">优享生活圈AI顾问</div>
                </div>
            </div>
            <div class="flex items-center space-x-3">
                <button @click="toggleDarkMode" class="p-2 rounded-full hover:bg-gray-100 dark:hover:bg-gray-700 transition-all">
                    <i :class="darkMode ? 'fas fa-moon' : 'fas fa-sun'" :style="darkMode ? { color: '#FBBF24' } : { color: '#FBBF24' }"></i>
                </button>
            </div>
        </header>

        <!-- 工具服务区域 -->
        <div class="px-4 py-3 bg-white dark:bg-gray-800 border-b dark:border-gray-700">
            <div class="max-w-4xl mx-auto">
                <h3 class="text-sm font-medium text-gray-500 dark:text-gray-400 mb-2">可用服务</h3>
                <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-5 gap-3">
                    <div
                            v-for="tool in tools"
                            :key="tool.id"
                            class="tool-card bg-gradient-to-br from-blue-500 to-indigo-600 text-white p-3 rounded-xl shadow-md cursor-pointer"
                            @click="useTool(tool)"
                    >
                        <div class="flex items-center space-x-2">
                            <i :class="tool.icon" class="text-xl"></i>
                            <div>
                                <div class="font-medium text-sm">{{ tool.name }}</div>
                                <div class="text-xs opacity-80">{{ tool.desc }}</div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 聊天内容区域 -->
        <div class="flex-1 overflow-y-auto p-4 space-y-6" ref="chatContainer" :class="{ 'bg-gray-800': darkMode }">
            <div v-for="(message, index) in messages" :key="index" class="max-w-3xl mx-auto message-enter" :style="{ animationDelay: `${index * 0.1}s` }">
                <div :class="['flex', message.role === 'user' ? 'justify-end' : 'justify-start']">
                    <div :class="['flex items-start space-x-3', message.role === 'user' ? 'flex-row-reverse space-x-reverse' : '']">
                        <div :class="['w-10 h-10 rounded-full flex items-center justify-center shadow-md transition-all',
                                        message.role === 'user'
                                            ? 'bg-gradient-to-br from-blue-500 to-indigo-600 text-white'
                                            : 'bg-gradient-to-br from-green-500 to-teal-500 text-white',
                                        darkMode && message.role === 'assistant' ? 'bg-gradient-to-br from-gray-700 to-gray-600 text-green-300' : '']">
                            <i :class="message.role === 'user' ? 'fas fa-user text-lg' : 'fas fa-robot text-lg'"></i>
                        </div>
                        <div :class="['p-4 rounded-2xl max-w-lg shadow-md transition-all',
                                        message.role === 'user'
                                            ? 'bg-gradient-to-br from-blue-500 to-indigo-600 text-white'
                                            : darkMode
                                                ? 'bg-gray-700 text-gray-100 border-gray-600'
                                                : 'bg-white shadow border border-gray-100']">
                            <div v-if="message.role === 'assistant' && message.isLoading" class="flex space-x-2">
                                <div :class="['w-2 h-2 rounded-full', darkMode ? 'bg-gray-400' : 'bg-gray-300', 'animate-pulse']"></div>
                                <div :class="['w-2 h-2 rounded-full', darkMode ? 'bg-gray-400' : 'bg-gray-300', 'animate-pulse delay-100']"></div>
                                <div :class="['w-2 h-2 rounded-full', darkMode ? 'bg-gray-400' : 'bg-gray-300', 'animate-pulse delay-200']"></div>
                            </div>
                            <div v-else class="whitespace-pre-wrap leading-relaxed">
                                    <span v-for="(char, charIndex) in message.content" :key="charIndex"
                                          :class="{'opacity-0': charIndex >= message.visibleChars, 'fade-in': charIndex < message.visibleChars}">
                                        {{ char }}
                                    </span>
                                <span v-if="message.isStreaming" class="typing-cursor"></span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 输入框区域 -->
        <footer :class="['border-t p-4', darkMode ? 'bg-gray-800 border-gray-700' : 'bg-white border-gray-200']">
            <div class="max-w-3xl mx-auto relative">
                <div class="flex items-center">
                        <textarea
                                v-model="userInput"
                                @keydown.enter.exact.prevent="sendMessage"
                                @keydown.ctrl.enter.exact.prevent="sendMessage"
                                @keydown.esc.exact="stopResponse"
                                placeholder="输入您的问题..."
                                :class="['flex-1 border rounded-2xl py-3 px-4 pr-12 focus:outline-none focus:ring-2 resize-none shadow-sm transition-all',
                                    darkMode
                                        ? 'bg-gray-700 border-gray-600 text-white focus:ring-blue-400 placeholder-gray-400'
                                        : 'border-gray-300 focus:ring-blue-500 focus:border-transparent']"
                                rows="1"
                                ref="textarea"
                                @input="adjustTextareaHeight"
                        ></textarea>
                    <button
                            @click="isLoading ? stopResponse() : sendMessage()"
                            :disabled="!userInput.trim() && !isLoading"
                            :class="['ml-2 p-3 rounded-full shadow-md transition-all transform hover:-translate-y-0.5',
                                    isLoading
                                        ? 'bg-gradient-to-r from-red-500 to-pink-500 hover:from-red-600 hover:to-pink-600 text-white'
                                        : 'bg-gradient-to-r from-blue-500 to-indigo-600 hover:from-blue-600 hover:to-indigo-700 text-white',
                                    'disabled:opacity-50 disabled:cursor-not-allowed']"
                    >
                        <i :class="isLoading ? 'fas fa-stop' : 'fas fa-paper-plane'"></i>
                    </button>
                </div>
            </div>
        </footer>
    </main>
</div>

<script>
    const {createApp, ref, nextTick, onMounted, watch} = Vue;

    createApp({
        setup() {
            const messages = ref([]);
            const userInput = ref('');
            const isLoading = ref(false);
            const chatContainer = ref(null);
            const textarea = ref(null);
            const darkMode = ref(false);
            const sidebarOpen = ref(true);
            const sessions = ref([]);
            const currentSessionId = ref('');
            const editingSessionId = ref(null);
            const newSessionTitle = ref('');

            const tools = ref([
                {
                    id: 1,
                    name: "店铺推荐",
                    desc: "查看推荐店铺",
                    icon: "fas fa-ticket-alt",
                    prompt: "帮我推荐一些店铺，店铺种类为："
                },
                {
                    id: 2,
                    name: "店铺查询",
                    desc: "查找附近商家",
                    icon: "fas fa-store",
                    prompt: "我想了解一下这家店的信息："
                },
                {
                    id: 3,
                    name: "预约服务",
                    desc: "预约餐厅/服务",
                    icon: "fas fa-calendar-check",
                    prompt: "我想预约这家店的服务："
                },
                {
                    id: 4,
                    name: "优惠券查询",
                    desc: "查看可用优惠",
                    icon: "fas fa-ticket-alt",
                    prompt: "我想查询这家店的优惠券："
                },
                {
                    id: 5,
                    name: "我的优惠券",
                    desc: "查询当前用户的优惠券",
                    icon: "fas fa-ticket-alt",
                    prompt: "我想查询我的优惠券，我的用户id为："
                }
            ]);

            const memoeryId = ref(Date.now().toString());
            let controller = null;
            let typingInterval = null;
            let currentTypingIndex = 0;

            const useTool = (tool) => {
                userInput.value = tool.prompt;
                adjustTextareaHeight();
                nextTick(() => {
                    textarea.value.focus();
                });
            };

            const adjustTextareaHeight = () => {
                const textareaEl = textarea.value;
                textareaEl.style.height = 'auto';
                textareaEl.style.height = `${Math.min(textareaEl.scrollHeight, 200)}px`;
            };

            const scrollToBottom = () => {
                nextTick(() => {
                    if (chatContainer.value) {
                        chatContainer.value.scrollTop = chatContainer.value.scrollHeight;
                    }
                });
            };

            const toggleDarkMode = () => {
                darkMode.value = !darkMode.value;
                localStorage.setItem('darkMode', darkMode.value);
            };

            const formatDateTime = (dateTime) => {
                if (!dateTime) return '';
                const date = new Date(dateTime);
                const now = new Date();
                const diff = now - date;
                const hours = Math.floor(diff / (1000 * 60 * 60));
                const days = Math.floor(diff / (1000 * 60 * 60 * 24));
                
                if (days === 0) {
                    if (hours === 0) {
                        return '刚刚';
                    }
                    return `${hours}小时前`;
                } else if (days === 1) {
                    return '昨天';
                } else if (days < 7) {
                    return `${days}天前`;
                }
                return date.toLocaleDateString('zh-CN');
            };

            const getSessionPreview = (session) => {
                if (session.sessionTitle) {
                    return session.sessionTitle;
                }
                try {
                    const messages = JSON.parse(session.messages);
                    if (messages && messages.length > 0) {
                        for (const msg of messages) {
                            let text = '';
                            if (msg.text && msg.text.text) {
                                text = msg.text.text;
                            } else if (msg.text) {
                                text = msg.text;
                            } else if (msg.content) {
                                text = msg.content;
                            }
                            if (text) {
                                return text.length > 20 ? text.substring(0, 20) + '...' : text;
                            }
                        }
                    }
                } catch (e) {
                    console.error('解析会话失败:', e);
                }
                return '新会话';
            };

            const loadSessions = async () => {
                try {
                    const response = await fetch('/api/sessions/list');
                    if (response.ok) {
                        sessions.value = await response.json();
                    }
                } catch (e) {
                    console.error('加载会话列表失败:', e);
                }
            };

            const loadSession = async (sessionId) => {
                try {
                    const response = await fetch(`/api/sessions/load/${sessionId}`);
                    if (response.ok) {
                        const jsonText = await response.text();
                        const chatMessages = JSON.parse(jsonText);
                        messages.value = chatMessages.map(msg => {
                            let content = '';
                            if (msg.text && msg.text.text) {
                                content = msg.text.text;
                            } else if (msg.text) {
                                content = msg.text;
                            }
                            let role = 'assistant';
                            if (msg.type === 'USER' || msg.type === 'user') {
                                role = 'user';
                            }
                            return {
                                role: role,
                                content: content,
                                isLoading: false,
                                visibleChars: content.length,
                                isStreaming: false
                            };
                        });
                        memoeryId.value = sessionId;
                        currentSessionId.value = sessionId;
                        scrollToBottom();
                    }
                } catch (e) {
                    console.error('加载会话失败:', e);
                }
            };

            const toggleImportant = async (session) => {
                try {
                    await fetch('/api/sessions/mark-important', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({
                            sessionId: session.sessionId,
                            isImportant: !session.isImportant
                        })
                    });
                    session.isImportant = !session.isImportant;
                } catch (e) {
                    console.error('标记重要会话失败:', e);
                }
            };

            const deleteSession = async (sessionId) => {
                if (!confirm('确定要删除这个会话吗？')) {
                    return;
                }
                try {
                    await fetch(`/api/sessions/delete/${sessionId}`, {
                        method: 'DELETE'
                    });
                    sessions.value = sessions.value.filter(s => s.sessionId !== sessionId);
                    if (currentSessionId.value === sessionId) {
                        startNewConversation();
                    }
                } catch (e) {
                    console.error('删除会话失败:', e);
                }
            };

            const startRenameSession = (session) => {
                editingSessionId.value = session.sessionId;
                newSessionTitle.value = session.sessionTitle || getSessionPreview(session);
                nextTick(() => {
                    const input = document.querySelector(`input[data-session-id="${session.sessionId}"]`);
                    if (input) {
                        input.focus();
                        input.select();
                    }
                });
            };

            const saveRenameSession = async (session) => {
                if (!newSessionTitle.value.trim()) {
                    editingSessionId.value = null;
                    return;
                }
                try {
                    await fetch('/api/sessions/rename', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({
                            sessionId: session.sessionId,
                            title: newSessionTitle.value.trim()
                        })
                    });
                    session.sessionTitle = newSessionTitle.value.trim();
                    editingSessionId.value = null;
                    await loadSessions();
                } catch (e) {
                    console.error('重命名会话失败:', e);
                }
            };

            const cancelRenameSession = () => {
                editingSessionId.value = null;
            };

            const startNewConversation = async () => {
                messages.value = [];
                memoeryId.value = Date.now().toString();
                currentSessionId.value = memoeryId.value;
                
                try {
                    await fetch('/api/sessions/create', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({
                            sessionId: memoeryId.value
                        })
                    });
                    
                    await loadSessions();
                } catch (e) {
                    console.error('创建会话失败:', e);
                }
                
                messages.value.push({
                    role: 'assistant',
                    content: '你好！我是优享生活圈提供的AI顾问，请问有什么能帮到您？您也可以直接点击上方的服务卡片快速使用相关功能。',
                    isLoading: false,
                    visibleChars: 0,
                    isStreaming: false
                });
                messages.value[0].visibleChars = messages.value[0].content.length;
                scrollToBottom();
                nextTick(() => {
                    textarea.value.focus();
                });
            };

            const startTypingEffect = (messageIndex) => {
                const message = messages.value[messageIndex];
                if (!message || message.visibleChars >= message.content.length) {
                    clearInterval(typingInterval);
                    typingInterval = null;
                    messages.value[messageIndex].isStreaming = false;
                    return;
                }

                messages.value[messageIndex].visibleChars++;
                scrollToBottom();
            };

            const sendMessage = async () => {
                if (!userInput.value.trim() || isLoading.value) return;

                if (controller) {
                    controller.abort();
                }
                controller = new AbortController();

                const userMessage = {
                    role: 'user',
                    content: userInput.value.trim(),
                    isLoading: false,
                    visibleChars: userInput.value.trim().length,
                    isStreaming: false
                };

                messages.value.push(userMessage);

                const assistantMessage = {
                    role: 'assistant',
                    content: '',
                    isLoading: true,
                    visibleChars: 0,
                    isStreaming: true
                };

                messages.value.push(assistantMessage);

                userInput.value = '';
                adjustTextareaHeight();
                scrollToBottom();

                isLoading.value = true;

                try {
                    const response = await fetch(`/chat?message=${encodeURIComponent(userMessage.content)}&memoryId=${memoeryId.value}`, {
                        signal: controller.signal
                    });

                    if (!response.ok) {
                        throw new Error(`HTTP error! status: ${response.status}`);
                    }

                    const reader = response.body.getReader();
                    const decoder = new TextDecoder('utf-8');
                    let buffer = '';
                    let messageIndex = messages.value.length - 1;

                    if (typingInterval) {
                        clearInterval(typingInterval);
                        typingInterval = null;
                    }

                    while (true) {
                        const {done, value} = await reader.read();
                        if (done) break;

                        const chunk = decoder.decode(value, {stream: true});
                        buffer += chunk;

                        messages.value[messageIndex].content = buffer;
                        messages.value[messageIndex].isLoading = false;

                        if (!typingInterval) {
                            typingInterval = setInterval(() => {
                                startTypingEffect(messageIndex);
                            }, 20);
                        }

                        scrollToBottom();
                    }

                    await loadSessions();
                    currentSessionId.value = memoeryId.value;

                } catch (error) {
                    if (error.name === 'AbortError') {
                        console.log('请求被用户中止');
                    } else {
                        console.error('请求出错:', error);
                        const lastMessage = messages.value[messages.value.length - 1];
                        lastMessage.content = '抱歉，请求过程中出现错误: ' + error.message;
                        lastMessage.visibleChars = lastMessage.content.length;
                    }
                } finally {
                    const lastMessage = messages.value[messages.value.length - 1];
                    lastMessage.isLoading = false;
                    lastMessage.isStreaming = false;

                    if (lastMessage.visibleChars < lastMessage.content.length) {
                        lastMessage.visibleChars = lastMessage.content.length;
                    }

                    isLoading.value = false;
                    controller = null;

                    if (typingInterval) {
                        clearInterval(typingInterval);
                        typingInterval = null;
                    }

                    scrollToBottom();
                }
            };

            const stopResponse = () => {
                if (controller) {
                    controller.abort();
                    const lastMessage = messages.value[messages.value.length - 1];
                    lastMessage.isLoading = false;
                    lastMessage.isStreaming = false;

                    if (lastMessage.visibleChars < lastMessage.content.length) {
                        lastMessage.visibleChars = lastMessage.content.length;
                    }

                    isLoading.value = false;
                    controller = null;

                    if (typingInterval) {
                        clearInterval(typingInterval);
                        typingInterval = null;
                    }
                }
            };

            onMounted(() => {
                darkMode.value = localStorage.getItem('darkMode') === 'true' ||
                    (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches);

                startNewConversation();
                loadSessions();
            });

            watch(messages, scrollToBottom, {deep: true});

            return {
                messages,
                userInput,
                isLoading,
                darkMode,
                chatContainer,
                textarea,
                sendMessage,
                stopResponse,
                toggleDarkMode,
                adjustTextareaHeight,
                startNewConversation,
                tools,
                useTool,
                sidebarOpen,
                sessions,
                currentSessionId,
                editingSessionId,
                newSessionTitle,
                loadSession,
                toggleImportant,
                deleteSession,
                startRenameSession,
                saveRenameSession,
                cancelRenameSession,
                formatDateTime,
                getSessionPreview
            };
        }
    }).mount('#app');
</script>
</body>
</html>
